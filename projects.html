<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Projects - XenonCommunity</title>
  <link rel="stylesheet" href="projects.css" />
</head>
<body>
<header class="top-bar">
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#contact-section">Contact Us</a></li>
    </ul>
  </nav>
</header>

<div class="projects-container" id="projects-container">
  <h1>Our Projects</h1>
  <p>Here is a list of our active projects:</p>
</div>

<section id="contact-section" class="contact-section">
  <div class="contact-box">
    <a href="https://discord.gg/e7mn6uuCmy" target="_blank">
      <h2>Contact us</h2>
    </a>
    <p>
      Powered by SyNdicate Foundation & Contributors with ❤️‍
      <br>
      Sourcecode licenses may apply
      <br>
      Happy coding! 😉 [12/31/2023 - 1402/11/10] 3:05 PM IRST (Asia/Tehran)
    </p>
  </div>
</section>
<script>
  const projectsContainer = document.getElementById('projects-container');

  async function fetchProjects() {
    try {
      const response = await fetch(`https://api.github.com/orgs/SyNdicateFoundation/repos`);
      const projects = await response.json();
      displayProjects(projects);
    } catch (error) {
      console.error('Error fetching projects:', error);
      projectsContainer.innerHTML = '<p>Failed to load projects. Please try again later.</p>';
    }
  }

  function displayProjects(projects) {
    const activeProjects = projects.filter(project => !project.archived);
    const archivedProjects = projects.filter(project => project.archived);

    projectsContainer.innerHTML += '';
    activeProjects.forEach(project => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.innerHTML = `
        <div class="project-info">
          <h2>${project.name}</h2>
          <p>${project.description || 'No description available.'}</p>
          <a href="${project.html_url}" target="_blank" class="project-link">View on GitHub</a>
        </div>
      `;
      projectsContainer.appendChild(card);
    });

    if (archivedProjects.length > 0) {
      const archivedHeader = document.createElement('p');
      archivedHeader.innerText = "Here is a list of our archived projects:";
      projectsContainer.appendChild(archivedHeader);

      archivedProjects.forEach(project => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
          <div class="project-info">
            <h2>${project.name}</h2>
            <p>${project.description || 'No description available.'}</p>
            <a href="${project.html_url}" target="_blank" class="project-link">View on GitHub</a>
          </div>
        `;
        projectsContainer.appendChild(card);
      });
    }
  }

  fetchProjects();
</script>

</body>
</html>
